# Render blueprint — provisions the web service + PostgreSQL together.
# In Render: New → Blueprint → connect this repo. Then run the one-time DB setup
# (see DEPLOY.md): open the service Shell and run  `cd server && npm run db:setup`.

services:
  - type: web
    name: aquatrack
    runtime: node
    plan: free                       # change to "starter" ($7/mo) for always-on (no cold starts)
    buildCommand: npm install && npm run build && npm --prefix server install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: aquatrack-db
          property: connectionString

databases:
  - name: aquatrack-db
    plan: free                       # free Postgres (expires after 30 days on free tier; upgrade to keep)
